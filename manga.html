<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Manga App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

/* VISTAS */
.view {
    display:none;
    padding:20px;
    text-align:center;
}
.active { display:block; }

/* SERIES */
.series-container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.series-card{
    width:220px;
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.series-card:hover{
    transform: translateY(-5px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.5);
}

.series-card:active{
    transform: scale(0.97);
}

.series-card img{
    width:100%;
}

.series-title{
    padding:10px;
}

/* CAPÍTULOS */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 160px));
    gap:20px;
    justify-content:center;
}

.card {
    background:#1a1a1a;
    padding:18px;
    border-radius:12px;
    cursor:pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.5);
}

.card:active{
    transform: scale(0.96);
}

/* BOTÓN */
.btn {
    background:#222;
    padding:12px;
    border-radius:10px;
    width:200px;
    margin:20px auto;
    cursor:pointer;
    transition: all 0.2s ease;
}

.btn:hover{
    background:#333;
    transform: translateY(-3px);
}

.btn:active{
    transform: scale(0.96);
}

/* LECTOR */
#lector { padding:0; }

#viewer {
    max-width:900px;
    margin:auto;
}

/* PÁGINAS */
.page {
    width:100%;
    margin:15px 0;
    border-radius:6px;
    box-shadow: 
        0 10px 25px rgba(0,0,0,0.7),
        0 0 40px rgba(0,0,0,0.5);
}

/* BOTÓN FLOTANTE */
.fab {
    position:fixed;
    bottom:20px;
    right:20px;
    width:55px;
    height:55px;
    background:#1f1f1f;
    border-radius:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,0.6);
    opacity:0;
    transition: all 0.25s ease;
}

.fab:hover{ transform: scale(1.1); }
.fab:active{ transform: scale(0.9); }
.fab.show { opacity:1; }

/* 📱 BOTÓN MÁS GRANDE EN MÓVIL */
@media (max-width: 768px) {

    .fab {
        width: 70px;
        height: 70px;
        font-size: 28px;
        bottom: 25px;
        right: 20px;
        border-radius: 18px;
    }

}
</style>
</head>

<body>

<!-- SERIES -->
<div id="series" class="view active">
    <h1>Series</h1>

    <div class="series-container">
        <div class="series-card" onclick="verCaps('sw','Shadowside')">
            <img src="img/sw/portada.jpg">
            <div class="series-title">Shadowside</div>
        </div>
    </div>

    <div class="btn" onclick="irInicio()">🏠 Inicio</div>
</div>

<!-- CAPÍTULOS -->
<div id="caps" class="view">
    <h1 id="tituloSerie"></h1>
    <div class="grid" id="listaCaps"></div>

    <div class="btn" onclick="mostrar('series')">← Volver</div>
</div>

<!-- LECTOR -->
<div id="lector" class="view">
    <div id="viewer"></div>
</div>

<!-- BOTÓN FLOTANTE -->
<div id="backBtn" class="fab" onclick="volver()">←</div>

<script>
let capActual="";
let hideBtn;

/* INDEX */
function irInicio(){
    window.location.href="index.html";
}

/* VISTAS */
function mostrar(id){
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    history.pushState({vista:id},"");
}

/* VOLVER */
function volver(){
    history.back();
}

/* HISTORIAL */
window.onpopstate = function(e){
    if(e.state){
        document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
        document.getElementById(e.state.vista).classList.add("active");
    } else {
        mostrar("series");
    }
};

/* SERIES */
function verCaps(serie,nombre){
    mostrar("caps");
    document.getElementById("tituloSerie").innerText=nombre;
    detectarCaps();
}

/* CAPÍTULOS */
async function detectarCaps(){
    let cont=document.getElementById("listaCaps");
    cont.innerHTML="";

    for(let i=1;i<=50;i++){
        let ok=await existe(`img/sw/sw${i}/1.png`);
        if(ok){
            let d=document.createElement("div");
            d.className="card";
            d.innerText="Cap "+i;
            d.onclick=()=>abrir("sw"+i);
            cont.appendChild(d);
        }
    }
}

/* LECTOR */
async function abrir(cap){
    capActual=cap;
    mostrar("lector");

    let viewer=document.getElementById("viewer");
    viewer.innerHTML="";

    for(let i=1;i<=300;i++){
        let src=`img/sw/${cap}/${i}.png`;
        let ok=await existe(src);
        if(!ok) break;

        let img=document.createElement("img");
        img.src=src;
        img.className="page";
        img.loading="lazy";

        viewer.appendChild(img);
    }

    // 🔥 RESTAURAR POR PORCENTAJE
    let progreso = localStorage.getItem(cap);

    if(progreso){
        let intento = setInterval(()=>{
            let alturaTotal = document.body.scrollHeight - window.innerHeight;

            if(alturaTotal > 0){
                let pos = alturaTotal * progreso;
                window.scrollTo(0, pos);
                clearInterval(intento);
            }
        }, 100);
    }
}

/* SCROLL + GUARDADO */
window.addEventListener("scroll",()=>{
    let btn=document.getElementById("backBtn");

    if(window.scrollY > 100){
        btn.classList.add("show");

        clearTimeout(hideBtn);
        hideBtn=setTimeout(()=>btn.classList.remove("show"),2000);
    }

    if(capActual){
        let alturaTotal = document.body.scrollHeight - window.innerHeight;

        if(alturaTotal > 0){
            let progreso = window.scrollY / alturaTotal;
            localStorage.setItem(capActual, progreso);
        }
    }
});

/* EXISTE */
function existe(src){
    return new Promise(r=>{
        let i=new Image();
        i.onload=()=>r(true);
        i.onerror=()=>r(false);
        i.src=src;
    });
}

/* INICIO */
history.replaceState({vista:"series"},"");
</script>

</body>
</html>
