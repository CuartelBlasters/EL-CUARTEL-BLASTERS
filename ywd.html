<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yo-kai Watch Dance</title>
<link rel="icon" type="image/png" href="img/favicon.png">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: url("img/fondoywj.png") center/cover no-repeat;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.header::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
}

/* LOGO */
.game-logo {
    max-width: 300px;
    width: 100%;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 6px 15px rgba(0,0,0,0.7));
    transition: transform 0.3s ease;
}

.game-logo:hover {
    transform: scale(1.05);
}

/* CONTENEDOR */
.container {
    display: flex;
    justify-content: center;
    padding: 30px;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 900px;
    width: 100%;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* IMAGEN PRINCIPAL */
.main-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
    transition: opacity 0.3s ease;
}

/* GALERÍA */
.gallery {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.gallery img {
    width: 150px;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* 🔥 CREADOR */
.creator {
    text-align: center;
    margin: 20px 0;
}

.creator-name {
    font-size: 26px;
    font-weight: bold;
    color: #ff2d8f;
    text-shadow: 0 0 10px rgba(255,45,143,0.6);
}

/* 🔗 BOTÓN SOLO IMAGEN */
.social-icon {
    display: inline-block;
    margin-top: 10px;
    transition: transform 0.2s, filter 0.2s;
}

.social-icon img {
    width: 38px;
    height: 38px;
}

.social-icon:hover {
    transform: translateY(-3px) scale(1.1);
    filter: drop-shadow(0 4px 10px rgba(255,45,143,0.6));
}

/* BOTÓN DESCARGA */
.btn {
    display: inline-block;
    margin-top: 15px;
    margin-bottom: 15px;
    padding: 10px 18px;
    background: linear-gradient(135deg, #6c3cff, #9a6cff);
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* VOLVER */
.back {
    display: inline-block;
    margin-top: 20px;
    color: #555;
    text-decoration: none;
    transition: color 0.2s;
}

.back:hover {
    color: #000;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .header { height: 150px; }
    .game-logo { max-width: 200px; }
    .gallery img { width: 100px; height: 70px; }
}
</style>

<script>
function cambiarImagen(src) {
    const img = document.getElementById("principal");
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = src;
        img.style.opacity = 1;
    }, 150);
}
</script>

</head>

<body>

<div class="header">
    <img src="img/logoywd.png" class="game-logo">
</div>

<div class="container">
    <div class="card">

        <img id="principal" class="main-img" src="img/ywd1.png">

        <div class="gallery">
            <img src="img/ywd1.png" onclick="cambiarImagen(this.src)">
            <img src="img/ywd2.png" onclick="cambiarImagen(this.src)">
            <img src="img/ywd3.png" onclick="cambiarImagen(this.src)">
            <img src="img/ywd4.png" onclick="cambiarImagen(this.src)">
            <img src="img/ywd5.png" onclick="cambiarImagen(this.src)">
        </div>

        <div class="creator">
            <h2>Creador del parche</h2>
            <div class="creator-name">Suprapote64</div>

            <!-- 🔗 ICONO RED SOCIAL -->
            <a href="https://www.youtube.com/@Suprapote-64" target="_blank" class="social-icon">
                <img src="img/youtube.png" alt="red social">
            </a>
        </div>

        <h2>Traducción al español</h2>

        <p>
        Este parche traduce completamente el juego al español incluyendo:
        </p>

        <ul style="text-align:left; display:inline-block;">
            <li>Textos de interfaz</li>
            <li>Todas las texturas del juego</li>
            <li>Videos localizado</li>
            <li>Música en español</li>
        </ul>

        <h3>Estado</h3>
        <p>Completo</p>

        <h3>Plataforma</h3>
        <p>Wii U / Emulador</p>

        <a href="https://drive.google.com/file/d/18jVxQNH4Pp_AqQigKU2Lm9W-tz7GVctj/view?usp=sharing" 
           class="btn" target="_blank">
            Obtener parche
        </a>

        <br>
        <a href="index.html" class="back">← Volver</a>

    </div>
</div>

</body>
</html>
